<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для моей любимой ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Летающие сердечки -->
<div id="hearts"></div>

<!-- Размытый фон -->
<div class="background"></div>

<!-- Всё содержимое сайта -->
<div id="app">

    <!-- Главная страница -->
    <section id="welcome" class="page active">

        <img src="images/you.jpg" class="photo">

        <h1>❤️ Для моей любимой ❤️</h1>

        <p class="message">
            Я хочу, чтобы ты постоянно улыбалась<br>
            и была счастливее всех на свете,<br>
            девочка моя ❤️
        </p>

        <button id="yesButton">
            💖 Пойдём на свидание
        </button>

        <button id="noButton">
            🙈 Нет
        </button>

    </section>

    <!-- Выбор свидания -->
    <section id="dateChoice" class="page">

        <h2>Что бы ты хотела? 🥰</h2>

        <div class="cards">

            <div class="card" data-type="🌃 Прогулка">
                🌃
                <span>Прогулка</span>
            </div>

            <div class="card" data-type="🍣 Ресторан">
                🍣
                <span>Ресторан</span>
            </div>

            <div class="card" data-type="🎬 Кино">
                🎬
                <span>Кино</span>
            </div>

            <div class="card" data-type="🧺 Пикник">
                🧺
                <span>Пикник</span>
            </div>

        </div>

    </section>

</div>

<div id="kiss">💋</div>

<script src="script.js"></script>

</body>
</html>
