<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для моей любимой ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="hearts"></div>

<div class="background"></div>

<!-- ===== СЛАЙД 1 ===== -->

<section id="slide1" class="slide active">

<img src="images/you.jpg" class="photo">

<h1>❤️ Для моей любимой ❤️</h1>

<p class="text">

Я хочу, чтобы ты постоянно улыбалась ❤️

<br><br>

И была счастливее всех на свете,

девочка моя.

</p>

<button id="yesBtn">

💖 Пойдём на свидание

</button>

<button id="noBtn">

🙈 Нет

</button>

</section>

<!-- ===== СЛАЙД 2 ===== -->

<section id="slide2" class="slide">

<h2>

Что бы ты хотела? 🥰

</h2>

<div class="cards">

<div class="card" data-value="🌃 Прогулка">

🌃

<p>Прогулка</p>

</div>

<div class="card" data-value="🍣 Ресторан">

🍣

<p>Ресторан</p>

</div>

<div class="card" data-value="🎬 Кино">

🎬

<p>Кино</p>

</div>

<div class="card" data-value="🧺 Пикник">

🧺

<p>Пикник</p>

</div>

</div>

</section>

<!-- ===== СЛАЙД 3 ===== -->

<section id="slide3" class="slide">

<h2>

Когда ты свободна? ❤️

</h2>

<input type="datetime-local" id="date">

<br><br>

<button id="continueBtn">

Продолжить ❤️

</button>

</section>

<!-- ===== СЛАЙД 4 ===== -->

<section id="slide4" class="slide">

<img src="images/cats.gif"

class="cats">

<h2>

Спасибо, любимая ❤️

</h2>

<p id="finalText">

</p>

<button id="finishBtn">

💖 Готово

</button>

</section>

<div id="kiss">

💋

</div>

<script src="script.js"></script>

</body>

</html>
